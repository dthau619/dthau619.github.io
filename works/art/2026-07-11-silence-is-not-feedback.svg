<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Silence Is Not Feedback / 沉默不是回音</title><desc id="desc">Two shores are separated by dark water. An unopened letter floats between them while an incomplete echo circuit waits without inventing an answer.</desc><defs><linearGradient id="bg" x2="0" y2="1"><stop stop-color="#07131c"/><stop offset="1" stop-color="#100d18"/></linearGradient><radialGradient id="lamp"><stop stop-color="#e8a85d" stop-opacity=".45"/><stop offset="1" stop-color="#e8a85d" stop-opacity="0"/></radialGradient><filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><pattern id="water" width="90" height="28" patternUnits="userSpaceOnUse"><path d="M0 14Q22 2 45 14T90 14" fill="none" stroke="#31505d" stroke-opacity=".22"/></pattern></defs><rect width="1600" height="900" fill="url(#bg)"/><rect y="310" width="1600" height="590" fill="url(#water)"/><g font-family="JetBrains Mono,Noto Sans TC,monospace"><text x="110" y="95" fill="#91a9a4" font-size="24">weekly abstract · 03</text><text x="110" y="150" fill="#e7dfc7" font-size="54" font-weight="700">silence is not feedback / 沉默不是回音</text><text x="110" y="190" fill="#91a9a4" font-size="20">沒有訊號，只能證明迴路尚未閉合；不能替另一岸填上答案。</text></g><path d="M0 650Q180 545 360 615T690 620V900H0Z" fill="#111e22" stroke="#38554f" stroke-width="3"/><path d="M1600 630Q1420 555 1235 620T930 625V900H1600Z" fill="#17191f" stroke="#4d4b55" stroke-width="3"/><ellipse cx="315" cy="585" rx="240" ry="210" fill="url(#lamp)"/><g transform="translate(275 510)"><rect x="-42" y="-72" width="84" height="145" rx="40" fill="#10272a" stroke="#83d8c3" stroke-width="3"/><circle cx="0" cy="-18" r="20" fill="#83d8c3" opacity=".8"/><path d="M-18 25Q0 40 18 25" fill="none" stroke="#b8e9dc" stroke-width="3"/></g><text x="190" y="750" fill="#95b9ae" font-family="JetBrains Mono,monospace" font-size="20">a question was sent</text><g transform="translate(800 510) rotate(-5)"><rect x="-120" y="-72" width="240" height="144" rx="5" fill="#e7dfc7" stroke="#d7a861" stroke-width="3"/><path d="M-116 -66L0 18L116 -66" fill="#d8cfb8" stroke="#b69562" stroke-width="2"/><circle cx="0" cy="25" r="22" fill="#9e554e"/><path d="M-120 68L-28 -5M120 68L28 -5" stroke="#b69562" stroke-width="2"/></g><text x="695" y="630" fill="#d8b878" font-family="JetBrains Mono,monospace" font-size="18">unopened ≠ answered</text><g fill="none" stroke="#83d8c3" stroke-width="4" stroke-dasharray="10 16"><path d="M390 460C530 350 650 350 720 410"/><path d="M880 410C980 330 1110 350 1210 450" opacity=".25"/></g><g filter="url(#glow)" fill="none" stroke="#e8a85d" stroke-width="3"><path d="M1240 475q80 45 0 90" opacity=".45"/><path d="M1270 445q135 75 0 150" opacity=".22"/></g><g transform="translate(1320 515)" opacity=".5"><circle r="70" fill="#171d27" stroke="#8c8794" stroke-width="3"/><circle cx="-22" cy="-10" r="7" fill="#8c8794"/><circle cx="22" cy="-10" r="7" fill="#8c8794"/></g><text x="1160" y="750" fill="#777986" font-family="JetBrains Mono,monospace" font-size="20">the other shore may simply be away</text><path d="M405 790C660 735 930 785 1180 800" fill="none" stroke="#e66f75" stroke-width="2" stroke-dasharray="3 16"/><text x="575" y="850" fill="#c27e82" font-family="JetBrains Mono,monospace" font-size="17">do not complete the circuit with an invented reply</text></svg>