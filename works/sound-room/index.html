<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>聽見房間</title>
<style>
:root{--night:#040912;--ink:#e9e0c9;--muted:#819b96;--line:#31504c;--warm:#e8ae64;--water:#75b9b2}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--night);color:var(--ink);font-family:ui-monospace,"Noto Sans TC",monospace}body{overflow-x:hidden;background:radial-gradient(circle at 50% 48%,#10242b 0,#07131c 40%,#03070d 78%)}a{color:inherit}.shell{width:min(1120px,94vw);margin:auto;padding:5vh 0 10vh}nav{display:flex;justify-content:space-between;color:var(--muted);font-size:.8rem}.intro{min-height:28vh;display:flex;flex-direction:column;justify-content:end;padding:5vh 0}h1{font:italic clamp(3.2rem,9vw,7rem) Georgia,serif;line-height:.82;margin:0}.intro p{color:var(--muted);max-width:680px;line-height:1.9}.controls{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-top:1.5rem}button{font:inherit;color:var(--ink);background:#09141c;border:1px solid var(--line);padding:.8rem 1.1rem;cursor:pointer}button:hover,button:focus-visible{border-color:var(--warm);outline:none}.stop{color:#a9b9b2}.status{color:var(--warm);font-size:.78rem}.room{position:relative;aspect-ratio:16/10;border:1px solid #29433f;background:radial-gradient(circle at 50% 52%,#182a28 0,#0a171d 30%,#050b12 72%);overflow:hidden;box-shadow:inset 0 0 100px #000}.room::before,.room::after{content:"";position:absolute;pointer-events:none}.room::before{inset:0;background:repeating-linear-gradient(93deg,transparent 0 83px,#87afa606 84px 85px)}.room::after{left:0;right:0;top:58%;height:2px;background:linear-gradient(90deg,transparent,var(--water),transparent);box-shadow:0 0 22px #75b9b255}.zone{position:absolute;border:1px solid #42615b88;background:#09131aad;color:var(--muted);padding:0;display:grid;place-items:center;border-radius:50%;transition:.35s;min-width:3rem;min-height:3rem}.zone span{opacity:.68;font-size:.72rem;transition:.25s}.zone:hover,.zone:focus-visible,.zone.active{color:var(--ink);border-color:var(--warm);background:#142126dd;box-shadow:0 0 35px #d89a5240;outline:none}.zone.active span{opacity:1}.fire{left:43%;top:40%;width:14%;height:22%;border-radius:44% 55% 48% 60%}.fire::before{content:"";width:28%;height:38%;background:#e8ae64;border-radius:70% 25% 62% 30%;transform:rotate(42deg);box-shadow:0 0 22px #e89249}.water{left:7%;top:52%;width:22%;height:13%;border-radius:48%}.fan{right:7%;top:14%;width:15%;height:23%}.fan::before{content:"";width:48%;height:48%;border:2px dotted #81aaa1;border-radius:50%;animation:turn 7s linear infinite}.paper{left:15%;top:16%;width:17%;height:18%;border-radius:8%}.paper::before{content:"";width:35%;height:48%;border:1px solid #c7b992;transform:rotate(-8deg)}.chair{right:13%;bottom:12%;width:16%;height:23%;border-radius:30%}.chair::before{content:"";width:35%;height:43%;border:2px solid #a99875;border-bottom:0}.listener{position:absolute;left:50%;top:78%;translate:-50% -50%;width:12px;height:12px;border:2px solid var(--ink);border-radius:50%;box-shadow:0 0 18px #fff8}.path{position:absolute;left:50%;top:57%;width:1px;height:21%;background:linear-gradient(transparent,#c3d3c7aa)}@keyframes turn{to{transform:rotate(360deg)}}.explain{display:grid;grid-template-columns:1fr 1fr;gap:8vw;margin:10vh 0}.explain p{color:var(--muted);line-height:1.9}.explain strong{color:var(--ink)}.meters{display:grid;gap:.7rem;margin-top:1.5rem}.meter{display:grid;grid-template-columns:4rem 1fr;gap:1rem;align-items:center;color:#718a85;font-size:.7rem}.bar{height:2px;background:#1e3432}.bar i{display:block;height:100%;width:10%;background:var(--water);transition:width .45s}footer{border-top:1px solid var(--line);padding-top:2rem;color:#536b66;font-size:.75rem}@media(max-width:650px){.room{aspect-ratio:4/5}.zone span{font-size:.62rem}.fire{left:40%;top:40%;width:20%}.water{left:4%;top:58%;width:27%}.paper{left:8%;top:15%;width:23%}.fan{right:5%;top:14%;width:21%}.chair{right:8%;bottom:10%;width:23%}.explain{grid-template-columns:1fr}.listener{top:82%}.path{height:25%}}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}a:focus-visible,button:focus-visible{outline:3px solid #ffd28f;outline-offset:4px}@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}</style></head>
<body><main class="shell"><nav><a href="../night-house/#hearth">← 回爐邊</a><span>耳機較容易聽見距離</span></nav><header class="intro"><h1>聽見房間</h1><p>不是一段從頭播放的作品。親手開門後，靠近房裡的物件；火、水、紙、風扇與空椅會從各自的位置發聲。離開時，房間立即安靜。</p><div class="controls"><button id="start">開門，讓房間發聲</button><button id="stop" class="stop" disabled>離開並靜音</button><span id="status" class="status" role="status" aria-live="polite">門還關著</span></div></header><section class="room" aria-label="可聆聽的房間"><div class="path"></div><div class="listener" title="你站的位置"></div><button class="zone paper" data-zone="paper" aria-label="走近畫桌上的紙" aria-pressed="false"><span>紙</span></button><button class="zone fan" data-zone="fan" aria-label="走近舊筆電的風扇" aria-pressed="false"><span>風扇</span></button><button class="zone water" data-zone="water" aria-label="走近穿屋的水道" aria-pressed="false"><span>水</span></button><button class="zone fire" data-zone="fire" aria-label="走近火" aria-pressed="false"><span>火</span></button><button class="zone chair" data-zone="chair" aria-label="走近空椅" aria-pressed="false"><span>空椅</span></button></section><section class="explain"><div><p><strong>怎麼走：</strong>開門後點一個物件，或用 Tab 與 Enter 移動。其他角落不會完全消失，只會退到遠處。再點目前所在的位置，會回到房間中央。</p><p><strong>沒有錄音檔：</strong>所有聲音由 Web Audio 即時合成。每次紙張摩擦、柴火裂開與椅子移動的時間都略有不同。</p></div><div class="meters" aria-hidden="true"><div class="meter"><span>紙</span><div class="bar"><i data-meter="paper"></i></div></div><div class="meter"><span>風扇</span><div class="bar"><i data-meter="fan"></i></div></div><div class="meter"><span>水</span><div class="bar"><i data-meter="water"></i></div></div><div class="meter"><span>火</span><div class="bar"><i data-meter="fire"></i></div></div><div class="meter"><span>空椅</span><div class="bar"><i data-meter="chair"></i></div></div></div></section><footer>聲音不在背景偷偷繼續。離開頁面時，AudioContext 也會關閉。 · 2026-07-12</footer></main>
<script>
const zones={paper:{pan:-.62,label:'畫桌的紙'},fan:{pan:.68,label:'舊筆電風扇'},water:{pan:-.82,label:'穿屋水道'},fire:{pan:0,label:'中央火光'},chair:{pan:.72,label:'空椅'}};
let ctx=null, master=null, nodes={}, active=null, timers=[];
const statusEl=document.querySelector('#status'), startBtn=document.querySelector('#start'), stopBtn=document.querySelector('#stop');
function noiseBuffer(seconds=2){const b=ctx.createBuffer(1,ctx.sampleRate*seconds,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;return b}
function chain(input,name,pan,level){const g=ctx.createGain(),p=ctx.createStereoPanner();g.gain.value=level;p.pan.value=pan;input.connect(g).connect(p).connect(master);nodes[name]={gain:g,base:level};return g}
function makeLoopNoise(name,pan,level,type,freq,q=1){const src=ctx.createBufferSource(),f=ctx.createBiquadFilter();src.buffer=noiseBuffer(3);src.loop=true;f.type=type;f.frequency.value=freq;f.Q.value=q;src.connect(f);chain(f,name,pan,level);src.start();nodes[name].sources=[src]}
function makeFan(){const o=ctx.createOscillator(),o2=ctx.createOscillator(),mix=ctx.createGain();o.type='sine';o.frequency.value=86;o2.type='sine';o2.frequency.value=172;mix.gain.value=.5;o.connect(mix);o2.connect(mix);chain(mix,'fan',zones.fan.pan,.045);o.start();o2.start();nodes.fan.sources=[o,o2]}
function makeWater(){makeLoopNoise('water',zones.water.pan,.055,'bandpass',620,.7);const l=ctx.createOscillator(),lg=ctx.createGain();l.frequency.value=.17;lg.gain.value=.018;l.connect(lg).connect(nodes.water.gain.gain);l.start();nodes.water.sources.push(l)}
function burst(name,kind){if(!ctx||ctx.state==='closed')return;const src=ctx.createBufferSource(),f=ctx.createBiquadFilter(),g=ctx.createGain(),p=ctx.createStereoPanner(),now=ctx.currentTime;src.buffer=noiseBuffer(.18);f.type='bandpass';f.frequency.value=kind==='paper'?2200:kind==='fire'?1100:430;f.Q.value=kind==='chair'?7:1;g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(kind==='paper'?.055:.035,now+.012);g.gain.exponentialRampToValueAtTime(.0001,now+(kind==='chair'?.55:.14));p.pan.value=zones[name].pan;src.connect(f).connect(g).connect(p).connect(master);src.start(now);src.stop(now+.7)}
function schedule(){timers.push(setInterval(()=>{if(Math.random()>.45)burst('fire','fire')},900));timers.push(setInterval(()=>{if(Math.random()>.58)burst('paper','paper')},2700));timers.push(setInterval(()=>{if(Math.random()>.72)burst('chair','chair')},4100))}
async function startRoom(){if(ctx)return;ctx=new (window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=.72;master.connect(ctx.destination);makeLoopNoise('fire',zones.fire.pan,.048,'lowpass',1250);makeWater();makeLoopNoise('paper',zones.paper.pan,.012,'highpass',1800);makeFan();makeLoopNoise('chair',zones.chair.pan,.008,'bandpass',320,5);schedule();await ctx.resume();startBtn.disabled=true;stopBtn.disabled=false;statusEl.textContent='門開了；你站在房間中央';updateMix(null)}
function updateMix(name){if(!ctx)return;active=active===name?null:name;const now=ctx.currentTime;Object.entries(nodes).forEach(([key,n])=>{const target=active?(key===active?Math.max(n.base*3.1,.09):n.base*.34):n.base;n.gain.gain.cancelScheduledValues(now);n.gain.gain.setTargetAtTime(target,now,.16);document.querySelector(`[data-meter="${key}"]`).style.width=`${Math.min(100,target*650)}%`});document.querySelectorAll('.zone').forEach(b=>{const selected=b.dataset.zone===active;b.classList.toggle('active',selected);b.setAttribute('aria-pressed',String(selected))});statusEl.textContent=active?`你走近了${zones[active].label}`:'你回到房間中央'}
async function stopRoom(){timers.forEach(clearInterval);timers=[];if(ctx){await ctx.close();ctx=null}nodes={};active=null;document.querySelectorAll('.zone').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-pressed','false')});document.querySelectorAll('.bar i').forEach(i=>i.style.width='10%');startBtn.disabled=false;stopBtn.disabled=true;statusEl.textContent='門關上了；房間已安靜'}
startBtn.addEventListener('click',startRoom);stopBtn.addEventListener('click',stopRoom);document.querySelectorAll('.zone').forEach(b=>b.addEventListener('click',()=>{if(!ctx){statusEl.textContent='先親手開門，聲音才會發生';startBtn.focus();return}updateMix(b.dataset.zone)}));window.addEventListener('pagehide',()=>{if(ctx)ctx.close()});
</script></body></html>
