<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>潮線信差</title>
<style>
:root{--sky:#c9d6d2;--sea:#416f78;--deep:#163b43;--sand:#b99d72;--paper:#f1e5c8;--ink:#202b2c;--rust:#a84e36;--safe:#d5b765}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(#9fb9b8 0 42%,#315f69 42% 63%,#9b825f 63%);color:var(--ink);font-family:ui-serif,"Noto Serif TC",serif}.wrap{width:min(940px,100%);margin:auto;padding:20px}.scene{position:relative;height:290px;overflow:hidden;border:4px solid #203d42;border-radius:18px;background:linear-gradient(#bfd0cc 0 48%,#527c82 48% 70%,#ad9168 70%);box-shadow:0 16px 40px #17343b55}.cloud{position:absolute;background:#e8eeea;border-radius:50%;opacity:.7}.c1{width:150px;height:32px;left:8%;top:18%}.c2{width:100px;height:25px;right:12%;top:10%}.lighthouse{position:absolute;right:7%;bottom:29%;width:55px;height:118px;background:#e8dfc8;clip-path:polygon(20% 0,80% 0,100% 100%,0 100%)}.lighthouse:before{content:"";position:absolute;left:0;top:20px;width:100%;height:22px;background:var(--rust)}.light{position:absolute;right:3%;bottom:68%;width:120px;height:34px;background:#ffe9a077;clip-path:polygon(0 45%,100% 0,100% 100%);transform-origin:left;animation:sweep 4s ease-in-out infinite alternate}@keyframes sweep{to{transform:rotate(-14deg)}}.boat{position:absolute;left:9%;bottom:23%;font-size:64px;filter:drop-shadow(5px 8px 2px #14363b66);transition:left .8s ease,bottom .8s ease,transform .3s}.water{position:absolute;left:0;right:0;bottom:0;height:31%;background:repeating-linear-gradient(0deg,#416f78 0 8px,#5b8990 9px 12px);transition:height .8s}.rocks{position:absolute;left:40%;bottom:22%;font-size:52px}.panel{margin-top:14px;background:#f1e5c8ee;border:3px solid #273f41;border-radius:16px;padding:18px;box-shadow:0 10px 25px #18363b44}.topline{display:flex;gap:12px;flex-wrap:wrap;justify-content:space-between}.meter{font-family:ui-monospace,monospace;font-weight:700}.letter{margin:12px 0;padding:12px 16px;background:#fff8e6;border-left:7px solid var(--rust);min-height:68px;white-space:pre-line}.choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}button{min-height:58px;border:2px solid #28484d;border-radius:10px;background:#fcf4dc;color:#1d3336;padding:9px;font:700 16px inherit;cursor:pointer;text-align:left}button:hover,button:focus-visible{background:#ffe29a;outline:4px solid #fff;outline-offset:2px}button:disabled{opacity:.45;cursor:not-allowed}.log{margin-top:12px;min-height:52px;font-size:15px}.end{font-size:21px;font-weight:700}.restart{background:#a84e36;color:white;text-align:center}.sr{position:absolute;left:-9999px}@media(max-width:620px){.wrap{padding:8px}.scene{height:230px}.choices{grid-template-columns:1fr}.boat{font-size:48px}.rocks{font-size:38px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style><style>
.hud{display:grid;grid-template-columns:repeat(4,minmax(90px,1fr));gap:8px;margin:12px 0}.hud span{background:#fff7df;border:2px solid #6b766f;border-radius:10px;padding:8px;text-align:center}.cargo{font-weight:700;color:var(--deep)}.letter-fold{margin:10px 0}.letter-fold summary{cursor:pointer;font-weight:700;padding:8px 0}.choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.choices button{display:flex;flex-direction:column;align-items:flex-start;min-height:82px;text-align:left}.choices button .action{font-size:1rem;font-weight:800}.choices button .cost{margin-top:7px;font:700 .82rem ui-monospace,monospace;color:#6f2e20}.choices button:focus-visible{outline:3px solid #ffcf40;box-shadow:0 0 0 6px #163b43}.hint{font-size:.84rem;color:#425657;margin:8px 0}.danger{color:#8d2f20;font-weight:800}@media(max-width:620px){.wrap{padding:10px}.scene{height:170px}.boat{font-size:46px}.lighthouse{height:88px}.panel{padding:12px}.hud{grid-template-columns:repeat(2,1fr)}.choices{grid-template-columns:1fr}.letter{font-size:.92rem}}
</style></head>
<body><main class="wrap"><h1>潮線信差</h1><p>天黑前把信送到燈塔。每一段路只能選一次；潮水不會退，信被改掉的字也不會回來。</p>
<section class="scene" aria-label="一艘小船正穿過漲潮的海岸，遠方有一座燈塔"><div class="cloud c1"></div><div class="cloud c2"></div><div class="light"></div><div class="lighthouse"></div><div class="rocks">🪨🪨</div><div id="water" class="water"></div><div id="boat" class="boat" role="img" aria-label="載著信的小船">⛵</div></section>
<section class="panel" aria-live="polite"><div class="topline"><strong id="stage" tabindex="-1">第 1／4 段：曬網灣</strong></div><div class="hud"><span>船況<br><b id="hull">3</b>／3</span><span>信件<br><b id="words">4</b> 段</span><span>帆布<br><b id="cloth">1</b> 件</span><span>潮位<br><b id="tide">0</b>／6</span></div><div id="cargo" class="cargo">隨船：備用帆布</div><details id="letterFold" class="letter-fold"><summary>查看信件內容</summary><div id="letter" class="letter"></div></details><div id="log" class="log"></div><p class="hint">可按數字鍵選擇；航程結束後按 R 重新出海。</p><div id="choices" class="choices"></div></section>
</main><script>
const original=['阿禾：','我沒有忘記港口邊的約定。','我把那枚生鏽的鑰匙留在紅磚下。','退潮時，我會回來。'];
let s,hull,tide,words,cloth,chart,hook,route,ended,history,pending;
function reset(){s=0;hull=3;tide=0;cloth=1;chart=false;hook=false;route='';words=[...original];ended=false;history=[];pending=null;render();}
function options(){
 if(s===0)return [
  {label:'貼岸划過礁脊（快，但擦傷船底）',h:-1,t:1,chart:true,note:'礁石割開船底；你也記住了燈塔灘的暗礁缺口。'},
  {label:'繞外灣追順流（慢，但撈到一支鉤篙）',h:0,t:2,givesHook:true,note:'船身完整。浮標旁漂著一支鉤篙，你把它撈上船。'}];
 if(s===1)return [
  {label:'剪帆布補船（帆布 -1）',h:+1,t:1,cloth:true,disabled:hull===3,note:'帆布堵住裂縫，但不能再拿來發信號。'},
  {label:'拿一段信紙堵裂縫',h:+1,t:1,cut:true,disabled:hull===3,note:'紙漿堵住船縫；被撕下的那段再也讀不到。'},
  {label:'不修，舀水穿過鹽草',h:0,t:1,note:hull<3?'裂縫仍在進水。你把時間省給後面的潮。':'船沒有進水，你直接穿過鹽草。'}];
 if(s===2)return [
  {label:'撞開窄樁（船況 -1）',h:-1,t:1,note:'木板撞上斷樁，船身又薄了一層。'},
  {label:'舉帆布請漁船讓道（帆布 -1）',h:0,t:1,cloth:true,note:'漁船看見帆布，收起橫在水道上的網。'},
  {label:'拿一段信作白旗',h:0,t:1,cut:true,note:'漁船讓開；那段文字留在浪裡。'},
  {label:'用鉤篙挑起攔網（鉤篙 -1，潮位不漲）',h:0,t:0,useHook:true,note:'鉤篙卡在網上。你趁水道打開時穿過。'}];
 return [
  {label:'趁浪頭衝灘（船況 -1）',h:-1,t:1,note:'船翻在淺水，你抱住還留下的信。'},
  {label:'照記下的暗礁缺口靠岸',h:0,t:1,needsChart:true,note:'第一段路留下的傷，換成最後一段路的入口。'},
  {label:'等燈光掃回礁線',h:0,t:2,note:'你看清礁石，潮水也在腳邊合攏。'}];
}
function choose(i){if(ended||pending)return;let c=options()[i];if(!c||c.disabled||(c.cloth&&cloth<1)||(c.useHook&&!hook)||(c.needsChart&&!chart))return;if(c.cut){pending=c;render();return;}finish(c);}
function finish(c,cutIndex=null){if(c.cloth)cloth--;if(c.useHook)hook=false;if(c.chart){chart=true;route='貼岸';}if(c.givesHook){hook=true;route='外灣';}if(cutIndex!==null)words[cutIndex]='［這一段已留在潮水裡］';hull=Math.min(3,hull+c.h);tide+=c.t;history.push(c.note+(cutIndex!==null?' 你親手決定哪句話不到岸。':''));pending=null;s++;if(hull<=0||tide>6||s>=4)ended=true;render();}
function result(){if(hull<=0)return['沉船','船在離燈塔還有一段路時散開。信沒有抵達。'];if(tide>6)return['潮水封路','最後一條沙徑沉進海裡。你只能帶著信退回去。'];let kept=words.filter(x=>!x.startsWith('［')).length,key=!words[2].startsWith('［'),promise=!words[3].startsWith('［'),memory=!words[1].startsWith('［');if(kept<2)return['只剩稱呼','信到了，但收信人只看見自己的名字。這算不算抵達，由你決定。'];if(key&&promise&&memory)return['完整抵達','阿禾讀完，把鑰匙從紅磚下取出，坐在港口等退潮。'];if(key&&promise)return['地址與承諾抵達','阿禾找到鑰匙，也知道你會回來；只是信裡沒有留下你是否還記得。'];if(key)return['鑰匙抵達','阿禾找到紅磚下的鑰匙，卻不知道你還會不會回來。'];if(promise)return['承諾抵達','阿禾知道你會回來，卻找不到那枚鑰匙。'];return['缺角的信抵達','阿禾攤開濕透的紙。重要的地址與承諾都留在海上。'];}
function effects(c){let x=[];if(c.h)x.push(`船況 ${c.h>0?'+':''}${c.h}`);if(c.t)x.push(`潮位 +${c.t}`);else if(c.t===0)x.push('潮位不漲');if(c.cloth)x.push('消耗帆布');if(c.useHook)x.push('消耗鉤篙');if(c.cut)x.push('犧牲一句信');if(c.chart)x.push('記住暗礁');if(c.givesHook)x.push('取得鉤篙');return x.join(' · ')}
function render(){document.querySelector('#hull').textContent=Math.max(0,hull);document.querySelector('#words').textContent=words.filter(x=>!x.startsWith('［')).length;document.querySelector('#cloth').textContent=cloth;document.querySelector('#tide').textContent=Math.min(6,tide);let cargo=[cloth?'備用帆布':'',hook?'鉤篙':'',chart?'暗礁記號':''].filter(Boolean);document.querySelector('#cargo').textContent='隨船：'+(cargo.join('、')||'無');document.querySelector('#letter').textContent=words.join('\n');document.querySelector('#letterFold').open=!!pending;document.querySelector('#water').style.height=(25+tide*6)+'%';document.querySelector('#boat').style.left=(9+Math.min(s,4)*17)+'%';document.querySelector('#boat').style.bottom=(20+tide*3)+'%';let box=document.querySelector('#choices'),log=document.querySelector('#log');box.innerHTML='';log.textContent=history.at(-1)||'兩條路都能抵達，但會留下不同的工具、傷與時間。';if(ended){let [title,text]=result();document.querySelector('#stage').textContent='航程結束';box.innerHTML=`<div class="end"><strong>${title}</strong><br>${text}<br><small>${route}航線 · 潮位 ${tide}/6 · 船況 ${Math.max(0,hull)}/3</small></div><button class="restart" onclick="reset()">換一條路重新出海</button>`;return;}if(pending){document.querySelector('#stage').textContent='不可逆選擇：哪句話不到岸？';for(let i=1;i<words.length;i++){if(words[i].startsWith('［'))continue;let b=document.createElement('button');b.innerHTML=`<span class="action">${i}. ${words[i]}</span><span class="cost danger">撕下後不會恢復</span>`;b.onclick=()=>finish(pending,i);box.appendChild(b);}return;}let names=['曬網灣','鹽草岬','斷樁水道','燈塔灘'];document.querySelector('#stage').textContent=`第 ${s+1}／4 段：${names[s]}`;options().forEach((c,i)=>{let b=document.createElement('button');b.innerHTML=`<span class="action">${i+1}. ${c.label}</span><span class="cost">${effects(c)}</span>`;b.disabled=!!(c.disabled||(c.cloth&&cloth<1)||(c.useHook&&!hook)||(c.needsChart&&!chart));b.onclick=()=>choose(i);box.appendChild(b);});}
document.addEventListener('keydown',e=>{if(!ended&&['1','2','3','4'].includes(e.key)){let n=Number(e.key)-1;if(pending){let candidates=[1,2,3].filter(i=>!words[i].startsWith('［'));if(candidates[n]!==undefined)finish(pending,candidates[n]);}else choose(n);}if(ended&&(e.key==='r'||e.key==='R'))reset();});
window.__game={reset,choose,cut:i=>pending&&finish(pending,i),state:()=>({s,hull,tide,cloth,words:[...words],pending:!!pending,ended,result:ended?result():null})};reset();
</script></body></html>
